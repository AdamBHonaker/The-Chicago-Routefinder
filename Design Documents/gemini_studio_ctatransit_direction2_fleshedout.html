<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CTA Transit Almanac — Redesign</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,100..900;1,9..144,100..900&family=Inter:wght@400;600;800&family=JetBrains+Mono:wght@500;700&700&display=swap" rel="stylesheet">
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        body { 
            margin: 0; 
            padding: 0; 
            background: #e3ddd2; 
            font-family: "Inter", -apple-system, sans-serif;
            color: #171310;
        }

        /* Paper Grain Animation & Flicker */
        @keyframes flicker {
            0% { opacity: 1; }
            50% { opacity: 0.4; }
            55% { opacity: 0.8; }
            100% { opacity: 1; }
        }

        @keyframes radar {
            0% { transform: scale(1); opacity: 0.8; }
            100% { transform: scale(3); opacity: 0; }
        }

        .almanac-bg {
            background-color: #f2ece0;
            background-image: url("https://www.transparenttextures.com/patterns/natural-paper.png");
            position: relative;
        }

        /* Formality Overlays */
        .special-dispatch {
            border: 3px double #1a1510;
            padding: 12px;
            background: #fffbef;
            font-style: italic;
            position: relative;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const D2 = {
            bg: "#f2ece0",
            bg2: "#e9e1d1",
            ink: "#171310",
            ink2: "#4a3f32",
            mute: "#7a6a54",
            mute2: "#a89a82",
            rule: "#1a1510",
            accent: "#9c2a1a",
            lake: "#cedde2",
            river: "#cbd4c5",
            serif: '"Fraunces", Georgia, serif',
            sans: '"Inter", sans-serif',
            mono: '"JetBrains Mono", monospace'
        };

        const LINE_COLORS = {
            Red: "#c60c30", Blue: "#00a1de", Brown: "#62361b", Green: "#009b3a",
            Orange: "#f9461c", Purple: "#522398", Pink: "#e27ea6", Yellow: "#f9e300"
        };

        // --- Geographic Schematic Map ---
        function SchematicMap({ activeLine = "Blue", theme = "paper" }) {
            const stations = {
                LoganSq:    { x: 80,  y: 110, label: "Logan Square" },
                California: { x: 130, y: 150, label: "California" },
                Western:    { x: 180, y: 180, label: "Western" },
                Damen:      { x: 225, y: 205, label: "Damen" },
                Division:   { x: 270, y: 225, label: "Division" },
                Chicago:    { x: 320, y: 240, label: "Chicago" },
                ClarkLake:  { x: 390, y: 260, label: "Clark/Lake" },
                Washington: { x: 420, y: 290, label: "Washington" },
                Monroe:     { x: 440, y: 320, label: "Monroe" }
            };

            const bluePath = "80,110 130,150 180,180 225,205 270,225 320,240 390,260 420,290 440,320";

            return (
                <svg viewBox="0 0 600 420" style={{ width: '100%', height: '100%', background: D2.bg }}>
                    <defs>
                        <pattern id="lake-hatch" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
                            <line x1="0" y1="0" x2="0" y2="6" stroke={D2.lake} strokeWidth="1" />
                        </pattern>
                    </defs>

                    {/* Geographic Orientation */}
                    <rect x="520" y="0" width="80" height="420" fill="url(#lake-hatch)" />
                    <text x="560" y="210" fill={D2.mute2} fontSize="10" fontWeight="800" 
                        style={{ writingMode: 'vertical-rl', letterSpacing: 4, opacity: 0.6 }}>LAKE MICHIGAN</text>
                    
                    <polyline points="380,0 380,220 410,260 600,260" fill="none" stroke={D2.river} strokeWidth="14" strokeOpacity="0.4" />

                    {/* Transit Line */}
                    <polyline points={bluePath} fill="none" stroke={LINE_COLORS.Blue} strokeWidth="5" strokeLinecap="round" strokeLinejoin="round" />

                    {/* Stations */}
                    {Object.entries(stations).map(([id, s]) => (
                        <g key={id}>
                            <circle cx={s.x} cy={s.y} r="4" fill="#fff" stroke={D2.rule} strokeWidth="1.5" />
                            {(id === "LoganSq" || id === "Monroe") && 
                                <text x={s.x + 10} y={s.y + 4} fontSize="10" fontWeight="700" fill={D2.ink}>{s.label.toUpperCase()}</text>
                            }
                        </g>
                    ))}

                    {/* Live Train Animation (Radar Ripple) */}
                    <g transform="translate(270, 225)">
                        <circle r="4" fill={D2.accent}>
                            <animate attributeName="r" from="4" to="12" dur="2s" repeatCount="indefinite" />
                            <animate attributeName="opacity" from="0.8" to="0" dur="2s" repeatCount="indefinite" />
                        </circle>
                        <circle r="4" fill={D2.accent} stroke="#fff" strokeWidth="1" />
                    </g>
                </svg>
            );
        }

        // --- Almanac Status Bar (The flickering lamp) ---
        function AlmanacStatus() {
            return (
                <div style={{ display: 'flex', alignItems: 'center', gap: 6 }}>
                    <span style={{ 
                        width: 6, height: 6, borderRadius: '50%', background: D2.accent,
                        animation: 'flicker 3s infinite step-end'
                    }} />
                    <span style={{ fontSize: 10, fontWeight: 700, letterSpacing: 1.5, textTransform: 'uppercase', color: D2.mute }}>
                        Signal Verified · Live
                    </span>
                </div>
            );
        }

        // --- HOME SCREEN ---
        function HomeView() {
            return (
                <div className="almanac-bg" style={{ height: '100%', display: 'flex', flexDirection: 'column' }}>
                    <div style={{ padding: '24px 24px 12px' }}>
                        <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: 9, letterSpacing: 2, fontWeight: 800, color: D2.mute }}>
                            <span>VOL. IV · NO. 112</span>
                            <span>MONDAY, APRIL 20</span>
                        </div>
                        <div style={{ height: 2, background: D2.rule, margin: '8px 0 16px' }} />
                        <h1 style={{ fontFamily: D2.serif, fontSize: 44, margin: 0, fontWeight: 700, lineHeight: 0.9, letterSpacing: -1 }}>
                            The Chicago <span style={{ fontStyle: 'italic', fontWeight: 400 }}>Transit</span> Almanac
                        </h1>
                        <p style={{ fontFamily: D2.serif, fontStyle: 'italic', fontSize: 13, color: D2.mute, marginTop: 12 }}>
                            A complete guide to the urban traveler's progress across the city.
                        </p>
                    </div>

                    <div style={{ padding: '0 24px' }}>
                        <div style={{ background: '#fffbef', border: `1px solid ${D2.rule}`, padding: 16 }}>
                            <div style={{ fontSize: 9, fontWeight: 800, letterSpacing: 2, color: D2.mute, marginBottom: 12 }}>IDENTIFY DESTINATION</div>
                            <div style={{ borderBottom: `1px dashed ${D2.mute2}`, paddingBottom: 12, marginBottom: 12 }}>
                                <span style={{ fontFamily: D2.serif, color: D2.mute, fontStyle: 'italic', fontSize: 14 }}>from </span>
                                <span style={{ fontFamily: D2.serif, fontSize: 18, fontWeight: 600 }}>Logan Square</span>
                            </div>
                            <div>
                                <span style={{ fontFamily: D2.serif, color: D2.mute, fontStyle: 'italic', fontSize: 14 }}>to </span>
                                <span style={{ fontFamily: D2.serif, fontSize: 18, color: D2.mute2 }}>Search destinations...</span>
                            </div>
                        </div>
                    </div>

                    <div style={{ padding: '24px', flex: 1 }}>
                        <div style={{ fontSize: 10, fontWeight: 800, letterSpacing: 2, color: D2.mute, marginBottom: 8 }}>SAVED VOYAGES</div>
                        <div style={{ height: 1, background: D2.rule, marginBottom: 12 }} />
                        {['Home', 'Merchandise Mart', 'Wrigley Field'].map(place => (
                            <div key={place} style={{ display: 'flex', justifyContent: 'space-between', padding: '8px 0', borderBottom: `1px solid ${D2.bg2}` }}>
                                <span style={{ fontFamily: D2.serif, fontSize: 16, fontWeight: 600 }}>{place}</span>
                                <span style={{ fontSize: 14 }}>→</span>
                            </div>
                        ))}
                    </div>

                    <div style={{ padding: '16px 24px', textAlign: 'center', borderTop: `1px solid ${D2.rule}` }}>
                        <AlmanacStatus />
                    </div>
                </div>
            );
        }

        // --- RESULTS SCREEN ---
        function ResultsView() {
            return (
                <div className="almanac-bg" style={{ height: '100%', display: 'flex', flexDirection: 'column' }}>
                    <div style={{ padding: '24px 24px 12px' }}>
                        <div style={{ fontSize: 10, fontWeight: 800, letterSpacing: 2, color: D2.accent, marginBottom: 4 }}>RECOMMENDED PATH</div>
                        <h1 style={{ fontFamily: D2.serif, fontSize: 28, margin: 0, fontWeight: 500, letterSpacing: -0.5 }}>
                            Logan Square <span style={{ fontStyle: 'italic', color: D2.mute }}>to</span> Art Institute
                        </h1>
                        <div style={{ height: 2, background: D2.rule, marginTop: 12 }} />
                    </div>

                    <div style={{ flex: 1, overflow: 'auto', padding: '0 24px' }}>
                        {/* Big Arrival Hero */}
                        <div style={{ display: 'flex', alignItems: 'flex-start', gap: 20, padding: '16px 0' }}>
                            <div style={{ fontFamily: D2.serif, fontSize: 72, fontWeight: 700, fontStyle: 'italic', lineHeight: 0.8, letterSpacing: -3 }}>27</div>
                            <div style={{ flex: 1 }}>
                                <div style={{ fontSize: 10, fontWeight: 800, letterSpacing: 2, color: D2.mute }}>MINUTES TOTAL</div>
                                <p style={{ fontFamily: D2.serif, fontStyle: 'italic', fontSize: 14, margin: '8px 0' }}>
                                    Board the Blue Line toward the Loop. Alight at Monroe Station.
                                </p>
                                <div style={{ display: 'flex', gap: 6 }}>
                                    <span style={{ background: LINE_COLORS.Blue, color: '#fff', padding: '2px 8px', fontSize: 10, fontWeight: 900 }}>BL</span>
                                    <span style={{ fontSize: 11, fontWeight: 700, color: D2.mute }}>Departing in 3m</span>
                                </div>
                            </div>
                        </div>

                        {/* Special Advisory (Accessibility Erratum) */}
                        <div className="special-dispatch" style={{ margin: '12px 0' }}>
                            <div style={{ fontSize: 9, fontWeight: 800, letterSpacing: 1, color: D2.accent, marginBottom: 4 }}>ADVISORY</div>
                            <div style={{ fontFamily: D2.serif, fontSize: 13, lineHeight: 1.4 }}>
                                The vertical lift at <strong>Jackson Station</strong> is non-operational. Patrons requiring step-free access should alight at <strong>Monroe</strong>.
                            </div>
                        </div>

                        {/* Timeline */}
                        <div style={{ marginTop: 24 }}>
                            <div style={{ fontSize: 10, fontWeight: 800, letterSpacing: 2, color: D2.mute, marginBottom: 12 }}>THE ITINERARY</div>
                            {[
                                { time: '17:47', action: 'Board Blue Line', sub: 'Inbound toward Forest Park' },
                                { time: '18:08', action: 'Alight at Monroe', sub: 'Exit via Northeast corner' },
                                { time: '18:14', action: 'Arrive at Destination', sub: 'The Art Institute' }
                            ].map((step, i) => (
                                <div key={i} style={{ display: 'flex', gap: 16, marginBottom: 16 }}>
                                    <span style={{ fontFamily: D2.mono, fontSize: 12, color: D2.mute }}>{step.time}</span>
                                    <div>
                                        <div style={{ fontFamily: D2.serif, fontWeight: 700, fontSize: 15 }}>{step.action}</div>
                                        <div style={{ fontFamily: D2.serif, fontStyle: 'italic', fontSize: 12, color: D2.mute }}>{step.sub}</div>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>

                    <div style={{ padding: '16px 24px' }}>
                        <button style={{ 
                            width: '100%', background: D2.ink, color: D2.bg, border: 'none', 
                            padding: '14px', fontFamily: D2.serif, fontStyle: 'italic', 
                            fontSize: 16, fontWeight: 600, cursor: 'pointer' 
                        }}>
                            Commence Journey ⟶
                        </button>
                    </div>
                </div>
            );
        }

        function App() {
            return (
                <div style={{ display: 'flex', gap: '40px', padding: '40px', justifyContent: 'center', minHeight: '100vh', boxSizing: 'border-box' }}>
                    
                    {/* Mobile Home */}
                    <div style={{ width: 390, height: 844, border: '12px solid #111', borderRadius: 40, overflow: 'hidden', boxShadow: '0 20px 50px rgba(0,0,0,0.2)' }}>
                         <HomeView />
                    </div>

                    {/* Mobile Results */}
                    <div style={{ width: 390, height: 844, border: '12px solid #111', borderRadius: 40, overflow: 'hidden', boxShadow: '0 20px 50px rgba(0,0,0,0.2)' }}>
                         <ResultsView />
                    </div>

                    {/* Desktop View */}
                    <div style={{ width: 1000, height: 700, border: '1px solid #999', background: '#fff', borderRadius: 8, overflow: 'hidden', display: 'flex', boxShadow: '0 30px 60px rgba(0,0,0,0.15)' }}>
                        <div style={{ width: 400, borderRight: `2px solid ${D2.rule}` }}>
                            <ResultsView />
                        </div>
                        <div style={{ flex: 1, position: 'relative' }}>
                            <div style={{ padding: '16px 24px', borderBottom: `1px solid ${D2.rule}`, display: 'flex', justifyContent: 'space-between' }}>
                                <span style={{ fontSize: 10, fontWeight: 800, letterSpacing: 2 }}>FIGURE I: TOPOGRAPHICAL REPRESENTATION</span>
                                <AlmanacStatus />
                            </div>
                            <SchematicMap />
                            <div style={{ position: 'absolute', bottom: 20, left: 24, right: 24, padding: 12, background: 'rgba(255,251,239,0.9)', border: `1px solid ${D2.rule}` }}>
                                <p style={{ fontFamily: D2.serif, fontStyle: 'italic', fontSize: 12, margin: 0 }}>
                                    Map showing the progress of the Inbound Blue Line relative to the Chicago River and Lake Michigan.
                                </p>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
