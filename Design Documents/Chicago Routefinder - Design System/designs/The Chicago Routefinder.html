<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>The Chicago Routefinder — Direction 2</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Fraunces:ital,opsz,wght@0,9..144,400..900;1,9..144,400..900&family=JetBrains+Mono:wght@400;500;600;700&display=swap" />
<style>
  html, body { margin: 0; padding: 0; background: #f0eee9; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif; }
  #root { min-height: 100vh; }
</style>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<!-- shared -->
<script type="text/babel" src="data.jsx"></script>
<script type="text/babel" src="schematic-map.jsx"></script>
<script type="text/babel" src="design-canvas.jsx"></script>

<!-- direction 2 -->
<script type="text/babel" src="d2-editorial.jsx"></script>
<script type="text/babel" src="d2-system.jsx"></script>

<script type="text/babel">

const PHONE_W = 390;
const PHONE_H = 780;
const DESK_W = 1280;
const DESK_H = 780;

function Phone({ children, label }) {
  return (
    <div data-screen-label={label} style={{
      width: PHONE_W, height: PHONE_H,
      background: "#111", borderRadius: 44, padding: 10,
      boxShadow: "0 2px 0 rgba(0,0,0,.15) inset, 0 20px 40px rgba(0,0,0,.08)"
    }}>
      <div style={{
        width: "100%", height: "100%", borderRadius: 34, overflow: "hidden",
        background: "#fff", position: "relative"
      }}>
        <div style={{
          position: "absolute", top: 8, left: "50%", transform: "translateX(-50%)",
          width: 110, height: 30, borderRadius: 20, background: "#000", zIndex: 50
        }} />
        <div style={{ height: "100%", width: "100%", paddingTop: 40, boxSizing: "border-box" }}>
          {children}
        </div>
      </div>
    </div>);

}

function DesktopFrame({ children }) {
  return (
    <div style={{
      width: DESK_W, height: DESK_H, background: "#1f1f22",
      borderRadius: 14, padding: 10, boxShadow: "0 20px 60px rgba(0,0,0,.12)"
    }}>
      <div style={{ display: "flex", gap: 6, padding: "4px 6px 8px" }}>
        <span style={{ width: 11, height: 11, borderRadius: 6, background: "#ff5f57" }} />
        <span style={{ width: 11, height: 11, borderRadius: 6, background: "#febc2e" }} />
        <span style={{ width: 11, height: 11, borderRadius: 6, background: "#28c840" }} />
      </div>
      <div style={{
        width: "100%", height: "calc(100% - 24px)", borderRadius: 8,
        overflow: "hidden", background: "#fff"
      }}>{children}</div>
    </div>);

}

// Cover / Legend artboard — lays out the pitch on cream paper.
function CoverArtboard() {
  return (
    <div style={{
      padding: 36, fontFamily: '"Inter", system-ui', color: D2.ink,
      background: D2.bg, height: "100%", boxSizing: "border-box",
      display: "flex", flexDirection: "column",
      backgroundImage:
      "radial-gradient(rgba(26,21,16,0.035) 1px, transparent 1px), radial-gradient(rgba(26,21,16,0.025) 1px, transparent 1px)",
      backgroundSize: "3px 3px, 7px 7px"
    }}>
      <div style={{ display: "flex", justifyContent: "space-between",
        fontSize: 10, letterSpacing: 2, fontWeight: 800, color: D2.mute, textTransform: "uppercase" }}>
        <span>Design Direction Study</span>
        <span>Vol. IV · No. 112</span>
      </div>
      <div className="d2-rule-thick" style={{ margin: "10px 0 18px" }} />
      <h1 style={{ fontFamily: D2.serif, fontSize: 54, fontWeight: 500, letterSpacing: -1.6,
        lineHeight: 0.9, margin: 0, fontStyle: "italic" }}>The Chicago</h1>
      <h1 style={{ fontFamily: D2.serif, fontSize: 54, fontWeight: 700, letterSpacing: -1.6,
        lineHeight: 0.9, margin: "2px 0 14px" }}>
        Routefinder<span style={{ color: D2.accent }}>.</span>
      </h1>
      <p style={{ fontFamily: D2.serif, fontSize: 16, color: D2.ink2, lineHeight: 1.5,
        margin: 0, maxWidth: 380 }}>
        A typography-forward rethinking of the city transit app — one that reads like
        a <i>printed almanac</i>: cream paper stock, Fraunces serif display, rules and
        drop-caps, lamps instead of sirens, the lake and river drawn on the map for
        orientation. This document flows left-to-right: product → system → principles.
      </p>

      <div className="d2-rule" style={{ margin: "22px 0 14px" }} />
      <div style={{ fontSize: 10, letterSpacing: 2, fontWeight: 800, color: D2.mute, textTransform: "uppercase", marginBottom: 10 }}>
        Contents
      </div>
      <ol style={{
        fontFamily: D2.serif, fontSize: 14, color: D2.ink, lineHeight: 1.6,
        margin: 0, paddingLeft: 22
      }}>
        <li><b>The Product</b> — nine screens of the PWA, mobile &amp; desktop.</li>
        <li><b>The System</b> — type, color, line pills, components, motion.</li>
        <li><b>The Principles</b> — six notes on voice and restraint.</li>
      </ol>

      <div style={{ marginTop: "auto", paddingTop: 18 }}>
        <div className="d2-rule-double" />
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline",
          marginTop: 10, fontSize: 10, letterSpacing: 2, textTransform: "uppercase",
          color: D2.mute, fontWeight: 700 }}>
          <span>⟡ Printed in Chicago ⟡</span>
          <span>Direction II / of V — locked</span>
        </div>
      </div>
    </div>);

}

function App() {
  return (
    <DesignCanvas>

      {/* ─── COVER / LEGEND ─── */}
      <DCSection id="cover"
      title="The Chicago Routefinder — Direction 2"
      subtitle="Editorial, typography-forward. Fleshed out from the original exploration and the Gemini refinements.">
        
        <DCArtboard id="cover" label="Cover · Contents" width={540} height={720}>
          <CoverArtboard />
        </DCArtboard>
        <DCArtboard id="map-plate" label="Plate II · The System" width={640} height={520}>
          <D2MapPlate />
        </DCArtboard>
      </DCSection>

      {/* ─── THE PRODUCT — MOBILE ─── */}
      <DCSection id="mobile"
      title="The Product · Mobile"
      subtitle="Nine screens of the PWA. Paper grain, drop-cap minutes, flickering signal lamp, radar-pulsed current stop.">
        
        <DCArtboard id="home" label="01 · Home" width={PHONE_W + 20} height={PHONE_H + 20}>
          <Phone label="01 Home"><D2Home /></Phone>
        </DCArtboard>
        <DCArtboard id="search" label="02 · Search" width={PHONE_W + 20} height={PHONE_H + 20}>
          <Phone label="02 Search"><D2Search /></Phone>
        </DCArtboard>
        <DCArtboard id="results" label="03 · Results" width={PHONE_W + 20} height={PHONE_H + 20}>
          <Phone label="03 Results"><D2Results /></Phone>
        </DCArtboard>
        <DCArtboard id="live" label="04 · Live Trip" width={PHONE_W + 20} height={PHONE_H + 20}>
          <Phone label="04 Live Trip"><D2LiveTrip /></Phone>
        </DCArtboard>
        <DCArtboard id="station" label="05 · Station" width={PHONE_W + 20} height={PHONE_H + 20}>
          <Phone label="05 Station"><D2Station /></Phone>
        </DCArtboard>
        <DCArtboard id="alerts" label="06 · Alerts" width={PHONE_W + 20} height={PHONE_H + 20}>
          <Phone label="06 Alerts"><D2Alerts /></Phone>
        </DCArtboard>
        <DCArtboard id="saved" label="07 · Saved" width={PHONE_W + 20} height={PHONE_H + 20}>
          <Phone label="07 Saved"><D2Saved /></Phone>
        </DCArtboard>
        <DCArtboard id="widget" label="08 · Lock-screen glance" width={PHONE_W + 20} height={PHONE_H + 20}>
          <Phone label="08 Widget"><D2Widget /></Phone>
        </DCArtboard>
      </DCSection>

      {/* ─── THE PRODUCT — DESKTOP ─── */}
      <DCSection id="desktop"
      title="The Product · Desktop"
      subtitle="Three-column broadsheet: vertical brand rail, route column, map plate with floating figure notes.">
        
        <DCArtboard id="desk" label="Desktop · Split View" width={DESK_W} height={DESK_H}>
          <DesktopFrame><D2Desktop /></DesktopFrame>
        </DCArtboard>
      </DCSection>

      {/* ─── THE SYSTEM ─── */}
      <DCSection id="system"
      title="The System"
      subtitle="Specimen sheets: type, palette, components, principles. Editable as a living reference.">
        
        <DCArtboard id="type" label="A · Type" width={540} height={720}>
          <D2Type />
        </DCArtboard>
        <DCArtboard id="colors" label="B · Color" width={540} height={720}>
          <D2Colors />
        </DCArtboard>
        <DCArtboard id="components" label="C · Components" width={540} height={720}>
          <D2Components />
        </DCArtboard>
        <DCArtboard id="principles" label="D · Principles" width={540} height={720}>
          <D2Principles />
        </DCArtboard>
      </DCSection>

    </DesignCanvas>);

}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
