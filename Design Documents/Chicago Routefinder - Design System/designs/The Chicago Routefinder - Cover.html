<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>The Chicago Routefinder — Cover</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Fraunces:ital,opsz,wght@0,9..144,400..900;1,9..144,400..900&family=JetBrains+Mono:wght@400;500;600;700&display=swap" />
<style>
  html, body { margin: 0; padding: 0; background: #f0eee9; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif; }
  #root { min-height: 100vh; }
</style>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<!-- shared -->
<script type="text/babel" src="data.jsx"></script>
<script type="text/babel" src="schematic-map.jsx"></script>
<script type="text/babel" src="design-canvas.jsx"></script>

<!-- direction 2 -->
<script type="text/babel" src="d2-editorial.jsx"></script>
<script type="text/babel" src="d2-system.jsx"></script>

<script type="text/babel">

// Cover / Legend artboard — lays out the pitch on cream paper.
function CoverArtboard() {
  return (
    <div style={{
      padding: 36, fontFamily: '"Inter", system-ui', color: D2.ink,
      background: D2.bg, height: "100%", boxSizing: "border-box",
      display: "flex", flexDirection: "column",
      backgroundImage:
      "radial-gradient(rgba(26,21,16,0.035) 1px, transparent 1px), radial-gradient(rgba(26,21,16,0.025) 1px, transparent 1px)",
      backgroundSize: "3px 3px, 7px 7px"
    }}>
      <div style={{ display: "flex", justifyContent: "space-between",
        fontSize: 10, letterSpacing: 2, fontWeight: 800, color: D2.mute, textTransform: "uppercase" }}>
        <span>Design Direction Study</span>
        <span>Vol. IV · No. 112</span>
      </div>
      <div className="d2-rule-thick" style={{ margin: "10px 0 18px" }} />
      <h1 style={{ fontFamily: D2.serif, fontSize: 54, fontWeight: 500, letterSpacing: -1.6,
        lineHeight: 0.9, margin: 0, fontStyle: "italic" }}>The Chicago</h1>
      <h1 style={{ fontFamily: D2.serif, fontSize: 54, fontWeight: 700, letterSpacing: -1.6,
        lineHeight: 0.9, margin: "2px 0 14px" }}>
        Routefinder<span style={{ color: D2.accent }}>.</span>
      </h1>
      <p style={{ fontFamily: D2.serif, fontSize: 16, color: D2.ink2, lineHeight: 1.5,
        margin: 0, maxWidth: 380 }}>
        A typography-forward rethinking of the city transit app — one that reads like
        a <i>printed almanac</i>: cream paper stock, Fraunces serif display, rules and
        drop-caps, lamps instead of sirens, the lake and river drawn on the map for
        orientation. This document flows left-to-right: product → system → principles.
      </p>

      <div className="d2-rule" style={{ margin: "22px 0 14px" }} />
      <div style={{ fontSize: 10, letterSpacing: 2, fontWeight: 800, color: D2.mute, textTransform: "uppercase", marginBottom: 10 }}>
        Contents
      </div>
      <ol style={{
        fontFamily: D2.serif, fontSize: 14, color: D2.ink, lineHeight: 1.6,
        margin: 0, paddingLeft: 22
      }}>
        <li><b>The Product</b> — nine screens of the PWA, mobile &amp; desktop.</li>
        <li><b>The System</b> — type, color, line pills, components, motion.</li>
        <li><b>The Principles</b> — six notes on voice and restraint.</li>
      </ol>

      <div style={{ marginTop: "auto", paddingTop: 18 }}>
        <div className="d2-rule-double" />
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline",
          marginTop: 10, fontSize: 10, letterSpacing: 2, textTransform: "uppercase",
          color: D2.mute, fontWeight: 700 }}>
          <span>⟡ Printed in Chicago ⟡</span>
          <span>Direction II / of V — locked</span>
        </div>
      </div>
    </div>);

}

function App() {
  return (
    <DesignCanvas>
      <DCSection id="cover"
      title="The Chicago Routefinder — Cover"
      subtitle="Editorial masthead and contents plate. The front matter for the study.">
        
        <DCArtboard id="cover" label="Cover · Contents" width={540} height={720}>
          <CoverArtboard />
        </DCArtboard>
        <DCArtboard id="map-plate" label="Plate II · The System" width={640} height={520}>
          <D2MapPlate />
        </DCArtboard>
      </DCSection>
    </DesignCanvas>);
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
