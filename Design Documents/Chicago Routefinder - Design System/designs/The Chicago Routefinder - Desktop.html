<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>The Chicago Routefinder — Desktop</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Fraunces:ital,opsz,wght@0,9..144,400..900;1,9..144,400..900&family=JetBrains+Mono:wght@400;500;600;700&display=swap" />
<style>
  html, body { margin: 0; padding: 0; background: #f0eee9; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif; }
  #root { min-height: 100vh; }
</style>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<!-- shared -->
<script type="text/babel" src="data.jsx"></script>
<script type="text/babel" src="schematic-map.jsx"></script>
<script type="text/babel" src="design-canvas.jsx"></script>

<!-- direction 2 -->
<script type="text/babel" src="d2-editorial.jsx"></script>
<script type="text/babel" src="d2-system.jsx"></script>

<script type="text/babel">

const DESK_W = 1280;
const DESK_H = 780;

function DesktopFrame({ children }) {
  return (
    <div style={{
      width: DESK_W, height: DESK_H, background: "#1f1f22",
      borderRadius: 14, padding: 10, boxShadow: "0 20px 60px rgba(0,0,0,.12)"
    }}>
      <div style={{ display: "flex", gap: 6, padding: "4px 6px 8px" }}>
        <span style={{ width: 11, height: 11, borderRadius: 6, background: "#ff5f57" }} />
        <span style={{ width: 11, height: 11, borderRadius: 6, background: "#febc2e" }} />
        <span style={{ width: 11, height: 11, borderRadius: 6, background: "#28c840" }} />
      </div>
      <div style={{
        width: "100%", height: "calc(100% - 24px)", borderRadius: 8,
        overflow: "hidden", background: "#fff"
      }}>{children}</div>
    </div>);
}

function App() {
  return (
    <DesignCanvas>
      <DCSection id="desktop"
      title="The Chicago Routefinder — Desktop"
      subtitle="Three-column broadsheet: vertical brand rail, route column, map plate with floating figure notes.">
        
        <DCArtboard id="desk" label="Desktop · Split View" width={DESK_W} height={DESK_H}>
          <DesktopFrame><D2Desktop /></DesktopFrame>
        </DCArtboard>
      </DCSection>
    </DesignCanvas>);
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
