<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>The Chicago Routefinder</title>

    <!--
      Content-Security-Policy — currently in REPORT-ONLY mode so any third-party
      asset (tile vendor, font CDN) we missed shows up as a console violation
      without breaking the page. Once a clean run through the main flows shows
      zero violations, swap "Content-Security-Policy-Report-Only" for
      "Content-Security-Policy" to enforce.

      Origins allowlisted:
        - tiles.openfreemap.org    → MapLibre style + tiles
        - fonts.googleapis.com     → Inter / Fraunces / JetBrains Mono CSS
        - fonts.gstatic.com        → woff2 font files
        - *.up.railway.app         → backend API (production)
        - http://localhost:8000    → backend API (dev)
    -->
    <meta http-equiv="Content-Security-Policy-Report-Only" content="
      default-src 'self';
      script-src 'self';
      style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
      font-src 'self' https://fonts.gstatic.com;
      img-src 'self' data: blob: https://tiles.openfreemap.org;
      connect-src 'self' https://*.up.railway.app http://localhost:8000 https://tiles.openfreemap.org;
      worker-src 'self' blob:;
      manifest-src 'self';
      frame-ancestors 'none';
      base-uri 'self';
      form-action 'self';
    " />

    <!-- PWA — theme-color is the OS chrome (status bar / tab bar) tint when -->
    <!-- the app is installed; matches manifest theme_color for consistency.   -->
    <meta name="theme-color" content="#171310" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Routefinder" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <!-- Social / SEO -->
    <meta name="description" content="A working guide to the trains, buses, and schedules of the city." />

    <!--
      Fonts — loaded from Google Fonts. SRI (`integrity` attribute) is NOT
      applied here because Google Fonts serves user-agent-tailored CSS at this
      URL (different @font-face URLs per browser), so a static SRI hash would
      break loads on most devices. Risk if fonts.googleapis.com is hijacked:
      attacker-controlled CSS, no script execution. The CSP meta tag above
      still scopes `style-src` to fonts.googleapis.com and nothing else.
      Long-term mitigation: self-host the Inter / Fraunces / JetBrains Mono
      subsets we actually use, then add SRI.

      Latin/Greek/Cyrillic types: Inter (sans body), Fraunces (serif headlines),
      JetBrains Mono (mono). Inter ships full Greek and Cyrillic glyph
      coverage so no extra family is needed for el / ru / uk / sr / mn / kk.

      Non-Latin script families (Feature LocaleExpansion, Chunk 13) — picked
      to harmonize with Inter's humanist x-height and stroke modulation
      where possible, falling back to Noto Sans <Script> for scripts with
      no obvious Inter sibling. Each family is loaded via Google Fonts CSS
      with a per-script unicode-range, so binary woff2 downloads only fire
      when a glyph in that range actually renders — initial page load for
      English riders is unchanged. Choice rationale per script:
        - Arabic family (ar, ur, ps, prs, fa, arz, mey, sd, ckb):
            IBM Plex Sans Arabic — IBM Plex was designed as a humanist sans
            sibling; matches Inter x-height and stroke modulation.
        - Hebrew (he):
            Heebo — explicit Inter sibling (same designer).
        - Devanagari (hi, mr, bho, mai):
            Hind — long-running Indic family designed for screen UI.
        - Bengali (bn) / Tamil (ta) / Telugu (te) / Kannada (kn):
            Hind Siliguri / Madurai / Guntur / Vadodara — same Hind family
            for visual consistency across Indic scripts.
        - Thai (th):
            Sarabun — explicitly Inter-aligned humanist proportions.
        - Khmer (km):
            Hanuman — closer to humanist sans than Noto Sans Khmer.
        - Myanmar (my, ksw):
            Padauk — standard high-quality typeface for Burmese / Karen.
        - Ethiopic (am, ti):
            Abyssinica SIL — refined letterforms designed for Ethiopic.
        - Malayalam (ml) / Odia (or) / Sinhala (si) / Lao (lo) /
          Kayah Li (eky) / Syriac (aii) / Hanifi Rohingya (rhg):
            Noto Sans <Script> — limited or no realistic alternatives;
            Noto is the safe baseline.
        - Han (zh, yue, ja, ko, nan):
            System CJK fallback — CJK font binaries are 2–30 MB each and
            system CJK rendering is universally available, so we deliberately
            do not load a web font for these.
        - Hanifi Rohingya (rhg):
            Noto Sans Hanifi Rohingya — was added to Google Fonts late in
            development; if the request 404s the unicode-range simply
            doesn't activate and the browser falls back to system font.
            Documented acceptable gap.
    -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Fraunces:ital,opsz,wght@0,9..144,400..900;1,9..144,400..900&family=JetBrains+Mono:wght@400;500;600;700&display=swap" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;500;700&family=Heebo:wght@400;500;700&family=Hind:wght@400;500;700&family=Hind+Siliguri:wght@400;500;700&family=Hind+Madurai:wght@400;500;700&family=Hind+Guntur:wght@400;500;700&family=Hind+Vadodara:wght@400;500;700&family=Sarabun:wght@400;500;700&family=Hanuman:wght@400;700&family=Padauk:wght@400;700&family=Abyssinica+SIL&family=Noto+Sans+Malayalam:wght@400;500;700&family=Noto+Sans+Oriya:wght@400;500;700&family=Noto+Sans+Sinhala:wght@400;500;700&family=Noto+Sans+Lao:wght@400;500;700&family=Noto+Sans+Kayah+Li&family=Noto+Sans+Syriac:wght@400;500;700&family=Noto+Sans+Hanifi+Rohingya:wght@400;500;700&display=swap" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
